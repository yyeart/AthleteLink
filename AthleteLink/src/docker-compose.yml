services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app/src
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - POSTGRES_DB=athletelink_db
      - POSTGRES_USER=athletelink_user
      - POSTGRES_PASSWORD=athletelink_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=$(POSTGRES_DB)
      - POSTGRES_USER=$(POSTGRES_USER)
      - POSTGRES_PASSWORD=$(POSTGRES_PASSWORD)
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    ports:
      - "5432:5432"

volumes:
  postgres_data: